min_version = "2026.7.5"

[tools]
go = "1.26.5"
golangci-lint = "2.12.2"

[env]
GOCACHE = "{{config_root}}/.cache/go-build"
GOLANGCI_LINT_CACHE = "{{config_root}}/.cache/golangci-lint"

[tasks.setup]
description = "固定した開発ツールとGit hooksをセットアップする"
run = '''
mise install
git config --local core.hooksPath .githooks
'''

[tasks.format]
description = "Goソースコードを整形する"
run = "golangci-lint fmt"

[tasks."format:check"]
description = "Goソースコードの整形差分がないことを確認する"
run = '''
diff="$(golangci-lint fmt --diff)"
printf '%s' "$diff"
test -z "$diff"
'''

[tasks.lint]
description = "Goコードを静的解析する"
run = "golangci-lint run"

[tasks.test]
description = "モデル不要のGoテストを実行する"
run = "go test ./..."

[tasks.build]
description = "モデル不要で全Goパッケージをビルドする"
run = "go build ./..."

[tasks.tidy]
description = "Goモジュールの依存関係を整理する"
run = "go mod tidy"

[tasks.check]
description = "CIと同じモデル不要の検証をすべて実行する"
depends = ["format:check", "lint", "test", "build"]
